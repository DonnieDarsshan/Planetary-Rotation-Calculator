<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

  th{background:#020617}

 #planetAspectTable thead th,

<body>

<h1>Planet Rotation Tool (KP / Vedic)</h1>

<div>
  Rotate from:
  <select id="pivotSelect"></select>

  <label><input type="checkbox" id="reverseCounting"> Retro</label>

 <label><input type="radio" name="houseSystem" value="Vedic"> Vedic</label>

  <th>Planet</th>
  <th>Sign</th>

</tr>

<h2 style="margin-top:40px">Planet → Planet Aspects</h2>

Base Planet :
<select id="planetAspectPivot"></select>

<input type="checkbox" id="fillPlanetsChk" checked>
Fill Planets
</label>

<thead>
<tr>
<th>Planet</th>
</tr>
</thead>

</table>

<thead>
<tr>
<th>Planet</th>
</tr>
</thead>

<script>
/* ================= CORE DATA ================= */

const SIGNS=["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
const PLANETS=["Lagna","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha","Ketu","Venus"];

const data={};

const cusps = Array(12).fill(null);

PLANETS.forEach(p=>data[p]={sign:"",degree:""});

const pivotSelect=document.getElementById("pivotSelect");
const planetAspectPivot = document.getElementById("planetAspectPivot");
const fillPlanetsChk = document.getElementById("fillPlanetsChk");
const tableBody=document.getElementById("tableBody");
const ignoreDegreesChk=document.getElementById("ignoreDegrees");
const reverseChk=document.getElementById("reverseCounting");
const legacyOppConjChk=document.getElementById("legacyOppConj");
const pivotRowChk=document.getElementById("pivotRowFromLagna");
const fileInput=document.getElementById("fileInput");

let ignoreDegrees=false;
let houseSystem="KP";
let reverseCounting=false;
let pivotRowFromLagna=true;
let legacyOppConj=true;
let birthDate = null;



/* ======================================================
   SWISS EPHEMERIS JSON SUPPORT (ABS DEG → SIGN + DEG)
   ====================================================== */

const swissFileInput = document.getElementById("swissFileInput");

document.getElementById("loadSwissBtn").onclick = () => swissFileInput.click();

/* ---- absolute degree → sign + degree ---- */
function absToSignDeg(abs){
  let a = abs % 360;
  if(a < 0) a += 360;

  const signIndex = Math.floor(a / 30);
  const degree = +(a - signIndex * 30).toFixed(2);

  return {
    sign: SIGNS[signIndex],
    degree: Math.floor(degree)
  };
}

/* ---- Swiss loader ---- */
swissFileInput.onchange = e => {
  const r = new FileReader();
  r.onload = () => {
    const o = JSON.parse(r.result);
	
	
	if(o.meta && o.meta.datetime_utc){
  birthDate = new Date(o.meta.datetime_utc);
}

    if(!o.lagna || !o.planets){
      alert("❌ Invalid Swiss Ephemeris JSON");
      return;
    }

    /* ---------- LAGNA ---------- */
    const lag = absToSignDeg(o.lagna);
    data.Lagna.sign = lag.sign;
    data.Lagna.degree = lag.degree;

    /* ---------- PLANETS ---------- */
    Object.entries(o.planets).forEach(([k,v])=>{
      if(!data[k]) return;
      const p = absToSignDeg(v);
      data[k].sign = p.sign;
      data[k].degree = p.degree;
    });
	
	
	/* ---------- CUSPS ---------- */
	/* ---------- CUSPS ---------- */
	if(o.cusps){

	  for(let i=0;i<12;i++){

		const val = o.cusps[(i+1).toString()];

		if(val===undefined || val===null){
		  cusps[i]=null;
		  continue;
		}

		let a = val % 360;
		if(a<0) a+=360;

		cusps[i] = +a.toFixed(2);
	  }

	}

    /* ---------- RESET UI STATE ---------- */
    pivotSelect.value = "Lagna";
    ignoreDegrees = false;
    reverseCounting = false;
    legacyOppConj = true;
    pivotRowFromLagna = true;
    houseSystem = "KP";

    ignoreDegreesChk.checked = false;
    reverseChk.checked = false;
    legacyOppConjChk.checked = true;
    pivotRowChk.checked = true;
    document.querySelector('input[value="Vedic"]').checked = true;

    buildTable();

	/* Auto select Moon Dasha Lord */
	planetAspectPivot.value = getBirthDashaLord();

	buildPlanetAspectTable();
	recalc();

  };

  r.readAsText(e.target.files[0]);
};




/* ================= INIT ================= */

PLANETS.forEach(p=>{

  const o=document.createElement("option");
  o.value=p;
  o.textContent=p;
  pivotSelect.appendChild(o);
});
pivotSelect.value="Lagna";



/* ---------- Planet Aspect Pivot Dropdown ---------- */
/* ---------- SPECIAL OPTIONS FIRST ---------- */
["Birth","Current"].forEach(p=>{
  const o=document.createElement("option");
  o.value=p;
  o.textContent=p;
  planetAspectPivot.appendChild(o);
});

/* ---------- NORMAL PLANETS ---------- */
/* ---------- NORMAL PLANETS (REPEATED TWICE) ---------- */

const aspectPlanets = PLANETS.filter(p=>p!=="Lagna");

/* first cycle */
aspectPlanets.forEach(p=>{
  const o=document.createElement("option");
  o.value=p;
  o.textContent=p;
  planetAspectPivot.appendChild(o);
});

/* second cycle */
aspectPlanets.forEach(p=>{
  const o=document.createElement("option");
  o.value=p;
  o.textContent=p;
  planetAspectPivot.appendChild(o);
});

planetAspectPivot.value="Birth";





planetAspectPivot.onchange=()=>{
  buildPlanetAspectTable();
  buildCuspAspectTable();
};


fillPlanetsChk.onchange=()=>{
  buildPlanetAspectTable();
};

/* ================= TABLE BUILD ================= */

function buildTable(){
  tableBody.innerHTML="";
  const start=PLANETS.indexOf(pivotSelect.value);
  const ordered=[...PLANETS.slice(start),...PLANETS.slice(0,start)];

  ordered.forEach(p=>{
    if(pivotSelect.value!=="Lagna" && p==="Lagna") return;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${p}</td>
      <td>
        <select data-p="${p}" data-t="sign">
          <option></option>
          ${SIGNS.map(s=>`<option>${s}</option>`).join("")}
        </select>
      </td>
      <td>
        <select data-p="${p}" data-t="deg">
          <option></option>
          ${[...Array(30).keys()].map(i=>`<option>${i}</option>`).join("")}
        </select>
      </td>
      <td id="out_${p}"></td>
      <td id="degdiff_${p}"></td>
      <td id="aspect_${p}"></td>
    `;
    tableBody.appendChild(tr);
  });

  tableBody.querySelectorAll("select").forEach(sel=>{
    const p=sel.dataset.p;
    if(sel.dataset.t==="sign"){
      sel.value=data[p].sign;
    }else{
      sel.value=data[p].degree;
      sel.classList.toggle("deg-disabled",ignoreDegrees);
    }
    sel.onchange=()=>{
      if(sel.dataset.t==="sign") data[p].sign=sel.value;
      else data[p].degree=sel.value;
      recalc();
    };
  });
}

/* ================= UTIL ================= */

function absDegree(s,d){
  return SIGNS.indexOf(s)*30 + d;
}

/* ================= RECALC CORE ================= */

function recalc(){
  const pivot = pivotSelect.value;

  if(!data[pivot].sign || data[pivot].degree===""){
    clearOutputs();
    return;
  }

  const pivotAbs = absDegree(data[pivot].sign, +data[pivot].degree);
  const lagnaAbs = (data.Lagna.sign && data.Lagna.degree!=="")
    ? absDegree(data.Lagna.sign, +data.Lagna.degree)
    : null;

  PLANETS.forEach(p=>{
    const out=document.getElementById("out_"+p);
    const degOut=document.getElementById("degdiff_"+p);
    const aspOut=document.getElementById("aspect_"+p);
    if(!out) return;

    if(!data[p].sign || data[p].degree===""){
      out.textContent="";
      degOut.textContent="";
      aspOut.textContent="";
      return;
    }

    const planetAbs = absDegree(data[p].sign, +data[p].degree);

    /* ===== DEGREE DIFFERENCE (ALWAYS PIVOT BASED) ===== */
    let rawDiff = planetAbs - pivotAbs;
    if(rawDiff < 0) rawDiff += 360;

    if(reverseCounting){
      rawDiff = 360 - rawDiff;
      if(rawDiff===360) rawDiff=0;
    }

    let displayDiff = rawDiff;
    if(legacyOppConj && rawDiff>180 && rawDiff<=359){
      displayDiff = rawDiff - 180;
    }

    degOut.textContent = ignoreDegrees ? "" : displayDiff.toFixed(2)+"°";
    aspOut.innerHTML = getAspectLabel(displayDiff, rawDiff);

    /* ===== HOUSE CALCULATION (CORRECTED) ===== */
    let basePivotAbs = pivotAbs;

    if(pivotRowFromLagna && pivot!=="Lagna" && p===pivot && lagnaAbs!==null){
      basePivotAbs = lagnaAbs;
    }

    let hdiff = reverseCounting
  ? basePivotAbs - planetAbs
  : planetAbs - basePivotAbs;

if(hdiff < 0) hdiff += 360;


    let house = houseSystem==="Vedic"
      ? Math.floor((hdiff+15)/30)+1
      : Math.floor(hdiff/30)+1;




	   if(house>12) house-=12;
	out.textContent = house;

	});

	buildPlanetAspectTable();
	buildCuspAspectTable();
	  
  
  
}

/* ================= CLEAR ================= */

function clearOutputs(){
  PLANETS.forEach(p=>{
    ["out_","degdiff_","aspect_"].forEach(id=>{
      const e=document.getElementById(id+p);
      if(e) e.textContent="";
    });
  });
}

/* ================= EVENTS ================= */

pivotSelect.onchange=()=>{
  buildTable();
  recalc();
};

ignoreDegreesChk.onchange=()=>{
  ignoreDegrees=ignoreDegreesChk.checked;
  buildTable();
  recalc();
};

reverseChk.onchange=()=>{
  reverseCounting=reverseChk.checked;
  recalc();
};

legacyOppConjChk.onchange=()=>{
  legacyOppConj=legacyOppConjChk.checked;
  recalc();
};

pivotRowChk.onchange=()=>{
  pivotRowFromLagna=pivotRowChk.checked;
  recalc();
};

document.querySelectorAll('input[name="houseSystem"]').forEach(r=>{
  r.onchange=()=>{
    houseSystem=r.value;
    recalc();
  };
});

/* ================= BUTTONS ================= */

document.getElementById("clearBtn").onclick=()=>{
  if(!confirm("⚠️ Are you sure you want to clear the entire chart?")) return;
  PLANETS.forEach(p=>data[p]={sign:"",degree:""});
  pivotSelect.value="Lagna";
  ignoreDegrees=false;
  reverseCounting=false;
  legacyOppConj=true;
  pivotRowFromLagna=true;
  ignoreDegreesChk.checked=false;
  reverseChk.checked=false;
  legacyOppConjChk.checked=true;
  pivotRowChk.checked=true;
  document.querySelector('input[value="Vedic"]').checked=true;
  houseSystem="Vedic";
  buildTable();
  clearOutputs();
};

document.getElementById("saveBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify({
    pivot:pivotSelect.value,
    ignoreDegrees,
    reverseCounting,
    legacyOppConj,
    houseSystem,
    pivotRowFromLagna,
    data
  },null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="kundali_chart.json";
  a.click();
};

document.getElementById("loadBtn").onclick=()=>fileInput.click();

fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    const o=JSON.parse(r.result);
    pivotSelect.value=o.pivot||"Lagna";
    Object.assign(data,o.data||{});
    ignoreDegrees=o.ignoreDegrees||false;
    reverseCounting=o.reverseCounting||false;
    legacyOppConj=o.legacyOppConj!==false;
    houseSystem=o.houseSystem||"Vedic";
    pivotRowFromLagna=o.pivotRowFromLagna!==false;

    ignoreDegreesChk.checked=ignoreDegrees;
    reverseChk.checked=reverseCounting;
    legacyOppConjChk.checked=legacyOppConj;
    pivotRowChk.checked=pivotRowFromLagna;
    document.querySelector(`input[value="${houseSystem}"]`).checked=true;

    buildTable();
    recalc();
  };
  r.readAsText(e.target.files[0]);
};

/* ================= INIT ================= */
buildTable();


/* ======================================================
   FINAL PRACTICAL ASPECT SET
   ====================================================== */

const WESTERN_ASPECTS = [

  /* ================= WHITE (CORE STRUCTURAL) ================= */
  { d:0, o:13, n:"Conjuct-Depends", c:"aspect-white" },
	{ d:180,   o:8,   n:"Oppo",   c:"aspect-bad" },

  /* ================= GREEN (STRONG HARMONY) ================= */
  { d:60,    o:5,   n:"Sextile",        c:"aspect-good" },
  { d:120,   o:8,   n:"Trine",          c:"aspect-good" },
  { d:72,    o:2,   n:"Quintile",       c:"aspect-good" },
  { d:144,   o:2,   n:"Biquintile",     c:"aspect-good" },

  /* ================= YELLOW (SOFT HARMONY) ================= */
  { d:18,    o:1,   n:"Vigintile",      c:"aspect-white" },
  { d:36,    o:1,   n:"Decile",         c:"aspect-white" },
  { d:54,    o:1,   n:"Tri-Vigintile",  c:"aspect-white" },
  { d:40,    o:1.5, n:"Novile",         c:"aspect-white" },
  { d:80,    o:1.5, n:"Binovile",       c:"aspect-white" },

  /* ================= ORANGE (NEUTRAL / ADJUSTMENT) ================= */
  { d:30,    o:3,   n:"Semi-Sextile",   c:"aspect-good" },
  { d:150,   o:4,   n:"Quincunx",       c:"aspect-bad" },

  /* Septile family (karmic / fated → neutral-intense) */
  { d:51.43,  o:1.5, n:"Septile",       c:"aspect-neutral" },
  { d:102.86, o:1.5, n:"Biseptile",     c:"aspect-neutral" },
  { d:154.29, o:1.5, n:"Triseptile",    c:"aspect-neutral" },

  /* ================= RED (TENSE / CHALLENGING) ================= */
  { d:45,    o:3,   n:"Semi-Square",     c:"aspect-bad" },
  { d:90,    o:6,   n:"Square",          c:"aspect-bad" },
  { d:135,   o:3,   n:"Sesqui-Quadrate",  c:"aspect-bad" },
  { d:165,   o:2,   n:"Quin-Decile",      c:"aspect-bad" }
];





/* ======================================================
   MOON NAKSHATRA → VIMSHOTTARI LORD
   ====================================================== */

const NAKSHATRA_LORDS = [
"Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
"Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
"Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha"
];

function getBirthDashaLord(){

  if(!data.Chandra.sign) return "Surya";

  const moonAbs = absDegree(data.Chandra.sign,+data.Chandra.degree);

  const NAK_LENGTH = 360/27;

  const nakIndex = Math.floor(moonAbs / NAK_LENGTH);

  const LORDS = [
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha"
  ];

  return LORDS[nakIndex];
}

function getCurrentDashaLord(){

  if(!data.Chandra.sign) return "Surya";

  const moonAbs = absDegree(data.Chandra.sign,+data.Chandra.degree);

  const NAK_LENGTH = 360/27;

  const nakIndex = Math.floor(moonAbs / NAK_LENGTH);

  const nakStart = nakIndex * NAK_LENGTH;

  const progress = (moonAbs - nakStart) / NAK_LENGTH;

  const LORDS = [
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha",
    "Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha"
  ];

  const DASHA_YEARS = {
    Ketu:7,
    Venus:20,
    Surya:6,
    Chandra:10,
    Mangala:7,
    Rahu:18,
    Jupiter:16,
    Saturn:19,
    Budha:17
  };

  let lord = LORDS[nakIndex];

  /* Birth Mahadasha length */
  const totalYears = DASHA_YEARS[lord];

  const balanceYears = totalYears * (1-progress);

  /* Approx progression to current date */
if(!birthDate) return lord;

const birth = birthDate;
const now = new Date();

  const yearsPassed = (now - birth) / (365.25*24*3600*1000);



const order = ["Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha"];




/* total elapsed since birth */
const elapsed = yearsPassed;

/* years after first mahadasha ended */
let cyclePos = elapsed - balanceYears;

/* still inside first mahadasha */
if(cyclePos < 0) return lord;

/* Vimshottari cycle */
cyclePos = cyclePos % 120;




let idx = (order.indexOf(lord) + 1) % 9;

while(true){

  const d = DASHA_YEARS[order[idx]];

  if(cyclePos <= d){
    return order[idx];
  }

  cyclePos -= d;

  idx = (idx+1) % 9;

}
  
  
  
}












/* ======================================================
   DEGREE QUALITY (FALLBACK)
   ====================================================== */

function degreeQuality(diff){
  if(
    (diff>=14  && diff<=26)  ||
    (diff>=54  && diff<=66)  ||
    (diff>=114 && diff<=126)
  ){
    return {t:"Good",c:"aspect-good"};
  }

  if(
    (diff>=39  && diff<=51)  ||
    (diff>=84  && diff<=96)  ||
    (diff>=129 && diff<=141) ||
    (diff>=159 && diff<=171)
  ){
    return {t:"Bad",c:"aspect-bad"};
  }

  return {t:"Neutral",c:"aspect-neutral"};
}










/* ======================================================
   ASPECT RESOLVER (STABLE)
   ====================================================== */

function getAspectLabel(diff, rawDiff){
  for(const a of WESTERN_ASPECTS){
    if(a.d===0){
	  if(Math.abs(rawDiff) <= a.o){
		return `<span class="${a.c}">${a.n}</span>`;
	  }
	}
    else if(a.d===180){
      if(Math.abs(rawDiff-180)<=a.o){
        return `<span class="${a.c}">${a.n}</span>`;
      }
    }
    else{
      if(Math.abs(diff-a.d)<=a.o){
        return `<span class="${a.c}">${a.n}</span>`;
      }
    }
  }

  const q=degreeQuality(diff);
  return `<span class="${q.c}">${q.t}</span>`;
}






function getHouseFromPivot(pivotPlanet, targetPlanet){

  if(!data[pivotPlanet].sign || !data[targetPlanet].sign) return "";

  const pivotAbs = absDegree(data[pivotPlanet].sign,+data[pivotPlanet].degree);
  const targetAbs = absDegree(data[targetPlanet].sign,+data[targetPlanet].degree);

  let diff = reverseCounting
    ? pivotAbs - targetAbs
    : targetAbs - pivotAbs;

  if(diff < 0) diff += 360;

  let house = houseSystem==="Vedic"
    ? Math.floor((diff+15)/30)+1
    : Math.floor(diff/30)+1;

  if(house>12) house-=12;

  return house;
}






function buildPlanetAspectTable(){

const table=document.querySelector("#planetAspectTable tbody");
/* ---------- ROTATION ORDER ---------- */
let pivot = planetAspectPivot.value || "Surya";

/* ---------- SPECIAL PIVOTS ---------- */
if(pivot==="Birth"){
  pivot = getBirthDashaLord();
}

if(pivot==="Current"){
  pivot = getCurrentDashaLord();
}

const basePlanets = PLANETS.filter(p=>p!=="Lagna");

const start = basePlanets.indexOf(pivot);

const ordered = [
  ...basePlanets.slice(start),
  ...basePlanets.slice(0,start)
];
const head=document.querySelector("#planetAspectTable thead tr");

head.innerHTML="<th>Planet</th>"+ordered.map(p=>{

  if(!data[p].sign) return `<th>${p}</th>`;

  const abs = absDegree(data[p].sign,+data[p].degree);

  return `<th>${p}<br>${abs.toFixed(2)}°</th>`;

}).join("");

table.innerHTML="";

ordered.forEach(p1=>{

  if(!data[p1].sign) return;




 const tr=document.createElement("tr");

const abs1=absDegree(data[p1].sign,+data[p1].degree);

let html=`<td>${p1}<br>${abs1.toFixed(2)}°</td>`;

  ordered.forEach(p2=>{

    if(!data[p2].sign){
      html+="<td></td>";
      return;
    }
	
	
	if(p1===p2){

  if(!fillPlanetsChk.checked){
    html+="<td></td>";
    return;
  }

  let reduced = abs1;

  if(reduced > 180){
    reduced = 360 - reduced;
  }

  const label = getAspectLabel(reduced,reduced);

  const house = getHouseFromPivot("Lagna",p1);
	html+=`<td>${label}<br>[${house}] ${reduced.toFixed(2)}°</td>`;
  return;
}

    const abs2=absDegree(data[p2].sign,+data[p2].degree);

    let diff=Math.abs(abs1-abs2);
    if(diff>180) diff=360-diff;

    let label = getAspectLabel(diff,diff);

	/* Rahu-Ketu opposition override (yellow) */
	if(
	  ((p1==="Rahu" && p2==="Ketu") || (p1==="Ketu" && p2==="Rahu")) &&
	  Math.abs(diff-180) <= 8
	){
	  label = `<span class="aspect-white">Oppo</span>`;
	}

	const house = getHouseFromPivot(p1,p2);
	html+=`<td>${label}<br>[${house}] ${diff.toFixed(2)}°</td>`;

  });

  tr.innerHTML=html;
  table.appendChild(tr);

});
}








function buildCuspAspectTable(){

const table=document.querySelector("#cuspAspectTable tbody");


/* ---------- ROTATION ORDER (same as planet table) ---------- */
let pivot = planetAspectPivot.value || "Surya";

/* ---------- SPECIAL PIVOTS ---------- */
if(pivot==="Birth"){
  pivot = getBirthDashaLord();
}

if(pivot==="Current"){
  pivot = getCurrentDashaLord();
}

const basePlanets = PLANETS.filter(p=>p!=="Lagna");

const start = basePlanets.indexOf(pivot);

const ordered = [
  ...basePlanets.slice(start),
  ...basePlanets.slice(0,start)
];

const head=document.querySelector("#cuspAspectTable thead tr");




head.innerHTML="<th>Planet</th>"+[...Array(12)].map((_,i)=>{

  let c = cusps[i];

  /* C1 must always equal Lagna */
  if(i===0 && data.Lagna.sign){
    c = absDegree(data.Lagna.sign,+data.Lagna.degree);
  }

  if(c===null) return `<th>C${i+1}</th>`;

  return `<th>C${i+1}<br>${c.toFixed(2)}°</th>`;

}).join("");







table.innerHTML="";

ordered.forEach(p=>{

  if(!data[p].sign) return;

 const tr=document.createElement("tr");

const abs1=absDegree(data[p].sign,+data[p].degree);

let html=`<td>${p}<br>${abs1.toFixed(2)}°</td>`;




  cusps.forEach((c,i)=>{

  if(i===0 && data.Lagna.sign){

  }

}







/* ================= SMART GRID COLOR ================= */

function getBrightness(hex){
  hex = hex.replace("#","");
  const r=parseInt(hex.substring(0,2),16);
  const g=parseInt(hex.substring(2,4),16);
  const b=parseInt(hex.substring(4,6),16);
  return (r*299 + g*587 + b*114)/1000;
}

function updateGridColor(){
  const bg = getComputedStyle(document.body).backgroundColor;

  const rgb = bg.match(/\d+/g).map(Number);
  const brightness = (rgb[0]*299 + rgb[1]*587 + rgb[2]*114)/1000;

  if(brightness > 140){
    document.documentElement.style.setProperty("--grid-color","#000000");
  }else{
    document.documentElement.style.setProperty("--grid-color","#ffffff");
  }
}

updateGridColor();
